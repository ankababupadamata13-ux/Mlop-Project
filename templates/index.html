<!DOCTYPE html>
<html>
<head>
    <title>Australia Weather Rain Prediction</title>

    <style>
        body{
            font-family: Arial;
            background-color:#f2f7f5;
            text-align:center;
        }

        .container{
            width:400px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            color:#2e7d32;
        }

        input{
            width:90%;
            padding:8px;
            margin:5px;
        }

        button{
            padding:10px 20px;
            background:#2e7d32;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#1b5e20;
        }

        .result{
            margin-top:20px;
            padding:10px;
            background:#e8f5e9;
            border-radius:8px;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Australia Weather Rain Prediction</h2>
<p>Enter weather parameters to predict rainfall</p>

<form method="POST">

<label>MinTemp (°C)</label><br>
<input type="number" step="any" name="MinTemp" required><br>

<label>MaxTemp (°C)</label><br>
<input type="number" step="any" name="MaxTemp" required><br>

<label>Rainfall (mm)</label><br>
<input type="number" step="any" name="Rainfall" required><br>

<label>Humidity 9 AM (%)</label><br>
<input type="number" step="any" name="Humidity9am" required><br>

<label>Humidity 3 PM (%)</label><br>
<input type="number" step="any" name="Humidity3pm" required><br><br>

<button type="submit">Predict Rainfall</button>

</form>

{% if prediction %}

<div class="result">

<h3>Prediction Result</h3>

<h2>{{ prediction }}</h2>

{% if advice %}
<p><b>Farmer Advice:</b></p>
<p>{{ advice }}</p>
{% endif %}

</div>

{% endif %}

</div>

</body>
</html>
