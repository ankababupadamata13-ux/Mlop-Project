<!DOCTYPE html>
<html>
<head>
    <title>Australia Weather Rain Prediction</title>
</head>
<body>

    <h2>Australia Weather Rain Prediction</h2>
    <p>Enter weather parameters to predict rainfall</p>

    <form method="POST">

        <label>MinTemp:</label>
        <input type="number" step="any" name="MinTemp" required><br><br>

        <label>MaxTemp:</label>
        <input type="number" step="any" name="MaxTemp" required><br><br>

        <label>Rainfall:</label>
        <input type="number" step="any" name="Rainfall" required><br><br>

        <label>Humidity9am:</label>
        <input type="number" step="any" name="Humidity9am" required><br><br>

        <label>Humidity3pm:</label>
        <input type="number" step="any" name="Humidity3pm" required><br><br>

        <button type="submit">Predict Rainfall</button>
    </form>

    {% if prediction %}
        <h3>Prediction Result: {{ prediction }}</h3>
    {% endif %}

</body>
</html>
